---
trigger: none
name: $(date:yyyyMMdd)$(rev:.r)
variables:
  System.Debug: true
  BuildConfiguration: Debug
resources:
  repositories:
    - repository: self
      type: git
      ref: main
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

schedules:
  - cron: "5 21 * * 2,4" # At 21:05 on Tuesday and Thursday
    displayName: "Generate design notes every Tuesday and Thursday"
    branches:
      include:
        - main
    always: true

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    sdl:
      codeql:
        compiled:
          enabled: true
      baseline:
        baselineSet: default
        baselineBranch: main
    pool:
      name: AzurePipelines-EO
      image: 1ESPT-Windows2022
      os: windows
    customBuildTags:
      - ES365AIMigrationTooling
    stages:
      - stage: GenerateDesignNotes
        jobs:
          - job: generate_design_notes
            displayName: Generate design notes
            templateContext:
              outputs:
                - output: pipelineArtifact
                  displayName: "Pipeline artifact containing GenDesignNotes output"
                  targetPath: $(build.artifactstagingdirectory)/GenDesignNotesOutput
                  artifactName: WifGenDesignNotesOutput
            steps:
              - checkout: self
              # - task: AzurePowerShell@5
              #   displayName: "Test Storage WIF Identity"
              #   inputs:
              #     azureSubscription: "$(AzureSubscriptionConnection)"
              #     ScriptType: FilePath
              #     ScriptPath: "$(System.DefaultWorkingDirectory)/automations/Test-StorageWifIdentity.ps1"
              #     azurePowerShellVersion: LatestVersion
              #     pwsh: true
                  
              - task: UseDotNet@2
                displayName: Use .NET 8 SDK
                inputs:
                  version: 8.x
              - task: NuGetAuthenticate@1
                displayName: "NuGet Authenticate"
              - script: |
                  dotnet build "$(Build.SourcesDirectory)/src/GenDesignNotes/GenDesignNotes.csproj" --configuration $(BuildConfiguration)
                displayName: "Build GenDesignNotes"
              - task: AzureCLI@2
                displayName: "Run GenDesignNotes"
                inputs:
                  azureSubscription: "$(AzureSubscriptionConnection)"
                  scriptType: "bash"
                  scriptLocation: "inlineScript"                  
                  addSpnToEnvironment: true
                  inlineScript: |
                    echo "== az account =="
                    az account show

                    # echo "== WIF vars (from addSpnToEnvironment) =="
                    # mkdir -p "$(Build.ArtifactStagingDirectory)/GenDesignNotesOutput"
                    # WIF_VARS_FILE="$(Build.ArtifactStagingDirectory)/GenDesignNotesOutput/wif-vars.txt"
                    # env | grep -E 'servicePrincipalId|tenantId|idToken' > "$WIF_VARS_FILE" || true
                    # echo "Saved WIF vars to: $WIF_VARS_FILE"

                    # echo "== Configure DefaultAzureCredential for WIF =="
                    # echo "servicePrincipalId=$servicePrincipalId"
                    # echo "tenantId=$tenantId"
                    # echo "idToken=$idToken"

                    # # Map Azure DevOps WIF env vars to what Azure.Identity.DefaultAzureCredential expects
                    # export AZURE_CLIENT_ID="$servicePrincipalId"
                    # export AZURE_TENANT_ID="$tenantId"
                    # export AZURE_FEDERATED_TOKEN_FILE="$idToken"

                    # echo "AZURE_CLIENT_ID=$AZURE_CLIENT_ID"
                    # echo "AZURE_TENANT_ID=$AZURE_TENANT_ID"
                    # echo "AZURE_FEDERATED_TOKEN_FILE=$AZURE_FEDERATED_TOKEN_FILE"

                    # echo "== can we get a Storage token? =="
                    # az account get-access-token --resource https://storage.azure.com/ -o jsonc

                    cd "$(Build.SourcesDirectory)/src/GenDesignNotes"
                    dotnet run
                env:
                  AzureStorageServiceUrl: $(AzureStorageServiceUrl)
                  ApisOfDotNetWebHookSecret: $(ApisOfDotNetWebHookSecret)
                  # AzureClientId: $(servicePrincipalId)
